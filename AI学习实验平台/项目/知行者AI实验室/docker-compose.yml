services:
  postgres:
    image: postgres:16-alpine
    container_name: zhixingzhe-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zhixingzhe_ai_lab
      POSTGRES_USER: zhixingzhe
      POSTGRES_PASSWORD: zhixingzhe_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./基础设施/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhixingzhe -d zhixingzhe_ai_lab"]
      interval: 5s
      timeout: 5s
      retries: 20

  chroma:
    image: chromadb/chroma:0.6.3
    container_name: zhixingzhe-ai-chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "exec 3<>/dev/tcp/localhost/8000; printf 'GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; head -1 <&3 | grep -q '200 OK'",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  chroma_data:
